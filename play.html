<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WarDrive3D - Stage Select</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* ===== TITLE ===== */
h1 {
    margin: 40px 0 20px;
    color: yellow;
    letter-spacing: 2px;
    text-align: center;
}

/* ===== CONTAINER ===== */
.container {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* ===== CARD ===== */
.card {
    width: 320px;
    background: #111;
    border-radius: 15px;
    overflow: hidden;
    border: 3px solid yellow;
    box-shadow: 0 0 20px red;
    transition: all 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 0 35px yellow;
    border-color: red;
}

/* ===== IMAGE ===== */
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* ===== CONTENT ===== */
.card-content {
    padding: 20px;
    text-align: center;
}

.card-content h2 {
    margin: 10px 0;
    color: yellow;
    font-size: 20px;
}

.card-content p {
    font-size: 14px;
    color: white;
}

/* ===== BUTTON ===== */
.play-btn {
    margin-top: 15px;
    padding: 10px 25px;
    border: none;
    border-radius: 8px;
    background: red;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.play-btn:hover {
    background: yellow;
    color: black;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        align-items: center;
    }
}

</style>
</head>

<body>

<h1>WARDRIVE 3D - STAGE SELECT</h1>

<div class="container">

    <!-- Stage 1 -->
    <div class="card" onclick="startStage('army')">
        <img src="/storage/emulated/0/download/ARMY.jpg" alt="Army Base">
        <div class="card-content">
            <h2>STAGE 1: ARMY BASE</h2>
            <p>Enter the military zone and survive intense combat missions.</p>
            <button class="play-btn">PLAY NOW</button>
        </div>
    </div>

    <!-- Stage 2 -->
    <div class="card" onclick="startStage('dragon')">
        <img src="/storage/emulated/0/Pictures/100PINT/Pins/dragon.jpg" alt="Dragon Challenge">
        <div class="card-content">
            <h2>STAGE 2: DRAGON CHALLENGE</h2>
            <p>Face the ultimate dragon boss in a fiery battlefield.</p>
            <button class="play-btn">PLAY NOW</button>
        </div>
    </div>

</div>

<script>
function startStage(stage) {
    if(stage === 'army') {
        window.location.href = "stage1.html";
    } else if(stage === 'dragon') {
        window.location.href = "stage2.html";
    }
}
</script>

</body>
</html>
